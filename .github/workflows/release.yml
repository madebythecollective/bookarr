name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build macOS app and DMG
        run: |
          chmod +x build/build-macos.sh
          build/build-macos.sh

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/Bookarr-*-macos.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows executable
        run: pyinstaller build/bookarr.spec --distpath dist --workpath build/pyinstaller --clean

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Windows installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" build\installer.iss

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/Bookarr-*-windows-setup.exe

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: artifacts

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*
          body: |
            ## Installation

            **macOS:** Download `Bookarr-x.x.x-macos.dmg`, open it, and drag Bookarr to your Applications folder.

            **Windows:** Download `Bookarr-x.x.x-windows-setup.exe` and run the installer.

            **Docker / Python:** See the [installation guide](https://github.com/madebythecollective/bookarr/blob/main/docs/installation.md).

            ## What's Changed

            See the [Changelog](https://github.com/madebythecollective/bookarr/blob/main/CHANGELOG.md) for details.
