function manualSearch(bookId, author, title, bookType) {
    const modal = document.getElementById('search-modal');
    modal.style.display = 'flex';
    const input = document.getElementById('indexer-search');
    input.value = author + ' ' + title;
    input.dataset.bookId = bookId;
    input.dataset.bookType = bookType || 'ebook';
    document.getElementById('indexer-results').innerHTML = '';

    // Update modal title based on type
    const modalTitle = document.getElementById('search-modal-title');
    if (bookType === 'audiobook') {
        modalTitle.textContent = 'Find Audiobook Download';
    } else {
        modalTitle.textContent = 'Find eBook Download';
    }

    searchIndexers(input.value);
}

async function searchIndexers(query) {
    const el = document.getElementById('indexer-results');
    el.innerHTML = '<div class="loading">Searching indexers...</div>';
    const bookId = document.getElementById('indexer-search').dataset.bookId;
    const bookType = document.getElementById('indexer-search').dataset.bookType || 'ebook';
    let url = '/api/search?q='+encodeURIComponent(query);
    if (bookId) url += '&book_id=' + bookId;
    const results = await api(url);
    if (!results.length) { el.innerHTML = '<div style="color:var(--text3);padding:14px;font-size:13px;">No results found.</div>'; return; }

    // Filter results to show relevant type first (only when not scored)
    let display = results;
    if (!bookId) {
        const filtered = results.filter(r => {
            const t = r.title.toLowerCase();
            if (bookType === 'audiobook') {
                return t.includes('audiobook') || t.includes('mp3') || t.includes('m4b') || r.category.startsWith('3');
            }
            return !t.includes('audiobook') || t.includes('epub') || t.includes('pdf') || t.includes('mobi');
        });
        display = filtered.length ? filtered : results;
    }

    el.innerHTML = display.slice(0,30).map(r => {
        const t = r.title.toLowerCase();
        const isAudio = t.includes('audiobook') || t.includes('mp3') || t.includes('m4b') || r.category.startsWith('3');
        const typeBadge = isAudio ? '<span class="badge b-blue" style="margin-left:8px;">Audio</span>' : '<span class="badge b-green" style="margin-left:8px;">eBook</span>';
        const protoBadge = r.protocol === 'torrent'
            ? '<span class="badge b-gray" style="margin-left:6px;">Torrent</span>'
            : '<span class="badge b-gray" style="margin-left:6px;">Usenet</span>';
        const seederInfo = r.seeders != null ? ` &middot; ${r.seeders} seed${r.seeders!==1?'s':''}` : '';
        let scoreBadge = '';
        if (r.score != null) {
            const sc = r.score;
            const cls = sc >= 70 ? 'b-green' : sc >= 40 ? 'b-yellow' : 'b-red';
            scoreBadge = `<span class="badge ${cls}" style="margin-left:8px;">${sc}</span>`;
        }
        const linkEsc = esc(r.link).replace(/'/g,"\\'");
        const titleEsc = esc(r.title).replace(/'/g,"\\'");
        return `
        <div class="sr" onclick="grabResult('${linkEsc}',${bookId||'null'},'${titleEsc}','${r.protocol||'usenet'}',${r.size||0})">
            <div class="sr-info">
                <div class="sr-title">${esc(r.title)}${typeBadge}${protoBadge}${scoreBadge}</div>
                <div class="sr-detail">${fmtSize(r.size)} &middot; Indexer ${r.indexer_id}${seederInfo}</div>
            </div>
        </div>
    `}).join('');
}

async function grabResult(link, bookId, title, protocol, size) {
    const client = protocol === 'torrent' ? 'torrent client' : 'NZBGet';
    toast('Sending to ' + client + '...');
    const r = await api('/api/grab','POST',{link, book_id:bookId, title, protocol: protocol||'usenet', size: size||0});
    toast(r.error ? 'Failed: '+r.error : 'Download started — sent to ' + client);
    // Refresh book detail behind the modal if open
    if (bookId) openBookDetail(bookId);
    render();
}

async function retryDownload(downloadId) {
    toast('Retrying download...');
    const r = await api('/api/download/'+downloadId+'/retry','POST');
    if (r.error) { toast('Retry failed: '+r.error); return; }
    toast('Book reset to wanted — searching now');
    render();
}

function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

render();
